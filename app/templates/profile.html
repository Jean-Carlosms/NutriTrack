{% extends "base.html" %}
{% block title %}Perfil | NutriTrack{% endblock %}

{% block content %}
  <h1 class="h3 mb-3">Perfil do usuario</h1>
  <form method="post" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Nome</label>
      <input class="form-control" name="name" value="{{ profile.name if profile else '' }}" required>
    </div>
    <div class="col-md-3">
      <label class="form-label">Idade</label>
      <input class="form-control" type="number" min="1" name="age" value="{{ profile.age if profile else '' }}" required>
    </div>
    <div class="col-md-3">
      <label class="form-label">Sexo</label>
      <select class="form-select" name="sex" required>
        {% for value, label in sex_options.items() %}
          <option value="{{ value }}" {% if profile and profile.sex == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Altura (cm)</label>
      <input class="form-control" type="number" step="0.1" min="0.1" name="height_cm" value="{{ profile.height_cm if profile else '' }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">Peso atual (kg)</label>
      <input class="form-control" type="number" step="0.1" min="0.1" name="current_weight_kg" value="{{ profile.current_weight_kg if profile else '' }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">Peso meta (kg)</label>
      <input class="form-control" type="number" step="0.1" min="0.1" name="target_weight_kg" value="{{ profile.target_weight_kg if profile else '' }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Nivel de atividade fisica</label>
      <select class="form-select" name="activity_level" required>
        {% for value, label in activity_levels.items() %}
          <option value="{{ value }}" {% if profile and profile.activity_level == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Objetivo</label>
      <select class="form-select" name="goal" required>
        {% for value, label in goals.items() %}
          <option value="{{ value }}" {% if profile and profile.goal == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <button class="btn btn-success">Salvar perfil</button>
    </div>
  </form>
{% endblock %}
