{% extends "base.html" %}
{% block title %}Login | NutriTrack{% endblock %}

{% block content %}
  <div class="login-panel mx-auto">
    <h1 class="h3 mb-2">Entrar no NutriTrack</h1>
    <p class="text-secondary">Autenticacao local simples para proteger seus dados neste computador.</p>

    <form method="post" class="row g-3">
      <input type="hidden" name="next" value="{{ next_path or '' }}">
      <div class="col-12">
        <label class="form-label">Usuario</label>
        <input class="form-control" name="username" value="{{ username }}" autocomplete="username" required>
      </div>
      <div class="col-12">
        <label class="form-label">Senha</label>
        <input class="form-control" type="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="col-12">
        <button class="btn btn-success w-100">Entrar</button>
      </div>
    </form>
  </div>
{% endblock %}
